name: Notify Feishu on Events

on:
  issues:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled]
  discussion:
    types: [created, edited, deleted, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    # 正确位置：before_install 放在 job 级别（与 steps 同级）
    before_install:
      - sudo apt-get update && sudo apt-get install -y jq
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send notification to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          ISSUE_URL: ${{ github.event.issue.html_url || 'N/A' }}
          PR_URL: ${{ github.event.pull_request.html_url || 'N/A' }}
          DISCUSSION_URL: ${{ github.event.discussion.html_url || 'N/A' }}
        run: |
          # 1. 确定事件链接（优先级：PR > Issue > Discussion）
          EVENT_URL=$PR_URL
          if [ "$EVENT_URL" = "N/A" ]; then
            EVENT_URL=$ISSUE_URL
          fi
          if [ "$EVENT_URL" = "N/A" ]; then
            EVENT_URL=$DISCUSSION_URL
          fi

          # 2. 构建合法的飞书文本消息（转义特殊字符）
          MESSAGE_CONTENT=$(printf "【GitHub 事件通知】\n仓库: %s\n事件类型: %s\n操作: %s\n触发人: %s\n事件链接: %s" \
            "$REPOSITORY" "$EVENT_NAME" "$EVENT_ACTION" "$ACTOR" "$EVENT_URL")
          
          # 3. 构建符合飞书要求的 JSON 消息体（用 jq 确保格式合法）
          MESSAGE=$(jq -n --arg content "$MESSAGE_CONTENT" '{
            "msg_type": "text",
            "content": {
              "text": $content
            }
          }')

          # 4. 发送请求到飞书 Webhook
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$MESSAGE" \
            "$FEISHU_WEBHOOK_URL"
        shell: bash
