name: Notify Feishu on Issue Created

on:
  issues:
    types: [opened]

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
        run: |
          # 换行符（最稳定写法）
          NL=$'\n'

          # 标签
          LABELS="${ISSUE_LABELS:-无}"

          # 解析 ### 功能类别
          类别=$(echo "$ISSUE_BODY" | awk '/### 功能类别/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
          类别=${类别:-未填写}

          # 解析 ### 功能概述
          概述=$(echo "$ISSUE_BODY" | awk '/### 功能概述/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
          概述=${概述:-未填写}

          # 解析 ### 优先级
          优先级=$(echo "$ISSUE_BODY" | awk '/### 优先级/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
          优先级=${优先级:-未填写}

          # 拼接消息
          TEXT="【GitHub 创建 Issue】${NL}"
          TEXT+="仓库：$REPOSITORY${NL}"
          TEXT+="标题：$ISSUE_TITLE${NL}"
          TEXT+="标签：$LABELS${NL}"
          TEXT+="发起人：$ACTOR${NL}"
          TEXT+="链接：$ISSUE_URL${NL}${NL}"
          TEXT+="🔹 功能类别：$类别${NL}"
          TEXT+="🔹 功能概述：$概述${NL}"
          TEXT+="🔹 优先级：$优先级"

          # 转义双引号 ＆ 处理换行
          SAFE_TEXT=$(echo "$TEXT" | sed 's/"/\\"/g' | awk -v ORS='\\n' '1')

          # 发送飞书
          curl -s -X POST $FEISHU_WEBHOOK_URL \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$SAFE_TEXT\"}}"
